<!DOCTYPE html>
<html lang="en">
<head>
    <title>Tubelet</title>
</head>
<body>
<div id="TubeletConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
     data-controller="__plugin/TubeletConfigPage.js">
    <div data-role="content">
        <div class="content-primary">
            <form id="TubeletConfigForm">
                <div class="verticalSection">
                    <div class="sectionTitleContainer flex align-items-center">
                        <h2 class="sectionTitle">Tubelet</h2>
                    </div>
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="ServerUrl">Tubelet server URL</label>
                        <input id="ServerUrl" name="ServerUrl" type="url" is="emby-input" required
                               placeholder="http://tubelet:8000" />
                        <div class="fieldDescription">
                            Base URL of the Tubelet server (no trailing slash). This is the same host that
                            serves this plugin repository. Example: <code>http://tubelet:8000</code>.
                        </div>
                    </div>
                    <button is="emby-button" type="submit" class="raised button-submit block">
                        <span>Save</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script type="text/javascript">
        (function () {
            var pluginId = 'b7c0e5cc-2b6e-4f83-9c6e-3a1d47e05f10';

            document.querySelector('#TubeletConfigPage').addEventListener('pageshow', function () {
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                    document.querySelector('#ServerUrl').value = config.ServerUrl || '';
                    Dashboard.hideLoadingMsg();
                });
            });

            document.querySelector('#TubeletConfigForm').addEventListener('submit', function (e) {
                e.preventDefault();
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                    config.ServerUrl = document.querySelector('#ServerUrl').value.replace(/\/+$/, '');
                    ApiClient.updatePluginConfiguration(pluginId, config).then(function (result) {
                        Dashboard.processPluginConfigurationUpdateResult(result);
                    });
                });
                return false;
            });
        })();
    </script>
</div>
</body>
</html>
