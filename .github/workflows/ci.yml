name: CI

on:
  push:
    branches: [main]
    tags: ['v*', 'plugin-v*']   # v* → docker image; plugin-v* → Jellyfin plugin release
  pull_request:

# Newer pushes to the same ref supersede in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      # The end-to-end pipeline test uses a fake yt-dlp but the real ffmpeg.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - name: Test
        working-directory: backend
        run: dotnet test --logger "console;verbosity=normal"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build (typecheck + bundle)
        working-directory: frontend
        run: npm run build

  plugin:
    name: Jellyfin plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build against current stable ABI
        working-directory: jellyfin-plugin
        run: dotnet build Jellyfin.Plugin.Tubelet/Jellyfin.Plugin.Tubelet.csproj -c Release

  plugin-preview:
    name: Jellyfin plugin (next-major preview)
    runs-on: ubuntu-latest
    # ABI churn against unreleased Jellyfin should surface as a signal, not block the pipeline.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      # The next-major preview (Jellyfin 12.x) targets net10.0, so the plugin TFM is bumped for this
      # build only. A compile failure here is real ABI churn to react to — informational, not blocking.
      - name: Build against next-major preview ABI
        working-directory: jellyfin-plugin
        run: >-
          dotnet build Jellyfin.Plugin.Tubelet/Jellyfin.Plugin.Tubelet.csproj -c Release
          -p:PluginTargetFramework=net10.0 -p:JellyfinControllerVersion=12.0.*-*

  image:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [backend, frontend, plugin]
    # Build on every push/PR; plugin-only tags don't produce an app image.
    if: ${{ !startsWith(github.ref, 'refs/tags/plugin-v') }}
    permissions:
      contents: read
      packages: write   # push to GHCR
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}   # ghcr.io/<owner>/<repo>
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Only authenticate when we intend to push (never on fork PRs — no secret access there).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Automatic tags: latest on default branch, the branch name, git tag semver, and the commit sha.
      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          # Build on PRs to validate the Dockerfile; push only on branch/tag pushes.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  plugin-release:
    name: Publish plugin (Jellyfin repo)
    runs-on: ubuntu-latest
    needs: [plugin]
    if: startsWith(github.ref, 'refs/tags/plugin-v')
    permissions:
      contents: write   # create the GitHub Release + upload assets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends zip
      # Build the plugin zip + a static manifest.json whose sourceUrl points at this release's asset,
      # then attach both to the Release. Users add releases/latest/download/manifest.json as a repo.
      - name: Pack and publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#plugin-v}"                                   # plugin-v1.0.0.0 -> 1.0.0.0
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          jellyfin-plugin/pack-repo.sh --out dist-repo --version "$ver" --abi 10.11.0.0 \
            --changelog "Tubelet plugin ${ver}." --base-url "$base"
          notes="Jellyfin plugin ${ver}. Add this repo in Jellyfin → Plugins → Repositories:
          https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/manifest.json"
          gh release create "$GITHUB_REF_NAME" dist-repo/manifest.json dist-repo/tubelet_*.zip \
            --title "Tubelet plugin ${ver}" --notes "$notes" \
          || gh release upload "$GITHUB_REF_NAME" dist-repo/manifest.json dist-repo/tubelet_*.zip --clobber
